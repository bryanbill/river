- name: pg
  kind: postgres
  uri: "postgres://river:river@localhost:5440/river"

- name: mysql
  kind: mysql
  uri: "mysql://river:river@localhost:3307/river"
  schema: river

# - name: mssql
#   kind: mssql
#   uri: "server=tcp:localhost,1433;database=master;trustservercertificate=true;user id=sa;password=RiverPass123!"

- name: mongo
  kind: mongodb
  uri: "mongodb://localhost:27017/river"

- name: sqlite
  kind: sqlite
  uri: "sqlite:river.db?mode=rwc"

- name: claude
  kind: ai
  provider: anthropic
  uri: "https://api.anthropic.com"
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-opus-4-6"
